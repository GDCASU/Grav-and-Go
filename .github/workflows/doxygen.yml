name: update-documentation

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate-docs:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/doxygen/doxygen:release_1_14_0

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate Documentation
        run: |
          cd Assets
          doxygen -g
          doxygen Doxyfile

      - name: Upload generated docs as artifact
        uses: actions/upload-artifact@v4
        with:
          name: generated-docs
          path: Assets/html/

  commit-docs:
    runs-on: ubuntu-latest
    needs: generate-docs
    if: success() && github.ref == 'refs/heads/main'
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download generated docs
        uses: actions/download-artifact@v4
        with:
          name: generated-docs

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Prepare docs branch
        run: |
          git fetch origin docs || echo "docs branch does not exist yet"
          git worktree add -B docs docs-branch origin/docs

      - name: Replace docs content
        run: |
          find docs-branch -mindepth 1 -delete
          ls docs-branch/*
          cp -r html/* docs-branch/

      - name: Commit and push docs
        run: |
          cd docs-branch
          git add --all
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          git commit -m "Update Doxygen docs for commit ${SHORT_SHA}" || echo "No changes to commit"
          git push origin HEAD:docs
